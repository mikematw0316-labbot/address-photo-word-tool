<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>地址照片整理與 Word 產生器</title>
  <style>
    :root{--ink:#172033;--muted:#67728a;--line:#dde3ec;--paper:#fff;--bg:#f4f6fa;--blue:#2257d6;--blue2:#eaf0ff;--green:#17805c;--amber:#a86509;--red:#b63c4a;--shadow:0 18px 50px rgba(26,39,69,.10)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif}
    header{background:linear-gradient(120deg,#142b66,#2457cc 65%,#3874ec);color:white;padding:42px 24px 68px}
    header .wrap{max-width:1180px;margin:auto} h1{font-size:32px;margin:0 0 10px;letter-spacing:.02em} header p{margin:0;color:#d9e4ff;font-size:16px}
    main{max-width:1180px;margin:-34px auto 70px;padding:0 20px}.card{background:var(--paper);border:1px solid rgba(221,227,236,.85);border-radius:18px;box-shadow:var(--shadow);padding:26px;margin-bottom:20px}
    .steps{display:flex;gap:8px;margin-bottom:20px}.step{flex:1;padding:12px 14px;border-radius:10px;background:#f2f4f8;color:#7b8497;font-weight:700;font-size:14px}.step.active{background:var(--blue2);color:var(--blue)}.step.done{background:#e8f7f1;color:var(--green)}
    .drop{border:2px dashed #b8c5df;border-radius:16px;text-align:center;padding:44px 20px;background:#fafbfe;transition:.2s;cursor:pointer}.drop.drag{border-color:var(--blue);background:var(--blue2)}.drop strong{display:block;font-size:20px;margin-bottom:8px}.drop span{color:var(--muted)}input[type=file]{display:none}
    button,.button{border:0;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:750;cursor:pointer;transition:.18s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{background:var(--blue);color:white}.primary:hover{background:#1847bd}.secondary{background:#edf1f7;color:#32405d}.danger{background:#fff0f2;color:var(--red)}button:disabled{opacity:.45;cursor:not-allowed}
    .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}.hidden{display:none!important}.notice{padding:13px 15px;border-radius:10px;background:#fff7e7;color:#865508;margin:14px 0;font-size:14px}.error{background:#fff0f2;color:var(--red)}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{background:#f7f8fb;border:1px solid var(--line);border-radius:12px;padding:16px}.metric b{display:block;font-size:25px}.metric span{font-size:13px;color:var(--muted)}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:16px 0}.toolbar input{width:320px;max-width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:14px}
    .record{display:grid;grid-template-columns:150px 1fr 150px;gap:18px;padding:18px 0;border-top:1px solid var(--line)}.thumb{width:150px;height:112px;object-fit:cover;border-radius:10px;background:#e9edf4}.filename{font-weight:750;margin-bottom:5px;word-break:break-all}.ocr{font-size:12px;color:var(--muted);max-height:45px;overflow:auto;margin-bottom:10px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:9px}.fields label{font-size:12px;color:var(--muted)}.fields input,.fields select{width:100%;margin-top:4px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:white;font-size:14px}.status{align-self:center;text-align:center}.badge{display:inline-block;padding:7px 10px;border-radius:20px;font-size:12px;font-weight:800}.ok{background:#e8f7f1;color:var(--green)}.warn{background:#fff4df;color:var(--amber)}.bad{background:#fff0f2;color:var(--red)}.confidence{font-size:12px;color:var(--muted);margin-top:8px}
    .result{text-align:center;padding:38px}.result h2{font-size:25px}.result p{color:var(--muted)}@media(max-width:760px){header{padding-top:30px}.summary{grid-template-columns:1fr 1fr}.record{grid-template-columns:88px 1fr}.thumb{width:88px;height:88px}.status{grid-column:1/-1;text-align:left}.fields{grid-template-columns:1fr}.steps{overflow:auto}.step{min-width:120px}}
  </style>
</head>
<body>
<header><div class="wrap"><h1>地址照片整理與 Word 產生器</h1><p>免安裝，任何電腦或手機皆可使用；自動辨識、人工確認、套用公會範本。</p></div></header>
<main>
  <div class="steps"><div class="step active" id="s1">1　上傳照片</div><div class="step" id="s2">2　確認地址</div><div class="step" id="s3">3　產生成果</div></div>
  <section class="card" id="uploadCard">
    <div class="drop" id="drop"><strong>拖曳照片或 ZIP 到這裡</strong><span>也可以點一下選擇檔案；支援 JPG、PNG、HEIC、TIFF、WebP</span><input id="files" type="file" multiple accept="image/*,.zip"></div>
    <div class="notice">隱私提醒：照片只用於本次分類與 Word 產生，服務會在 24 小時內自動刪除暫存檔。</div>
    <div id="fileInfo" class="notice hidden"></div><div id="uploadError" class="notice error hidden"></div>
    <div class="actions"><button class="primary" id="analyze" disabled>開始辨識與分類</button></div>
  </section>
  <section class="card hidden" id="reviewCard">
    <h2>確認分類結果</h2><p style="color:var(--muted)">黃色與紅色項目需要確認。修改地址後，狀態會自動更新為可分類。</p>
    <div class="summary"><div class="metric"><b id="total">0</b><span>總照片數</span></div><div class="metric"><b id="success">0</b><span>成功分類</span></div><div class="metric"><b id="pending">0</b><span>待確認</span></div><div class="metric"><b id="addresses">0</b><span>地址數</span></div></div>
    <div class="toolbar"><input id="search" placeholder="搜尋檔名或地址"><button class="secondary" id="showPending">只看待確認</button></div>
    <div id="records"></div><div id="generateError" class="notice error hidden"></div>
    <div class="actions"><button class="secondary" id="back">重新上傳</button><button class="primary" id="generate">產生分類資料夾與 Word</button></div>
  </section>
  <section class="card result hidden" id="resultCard"><h2>成果已完成</h2><p>內含分類照片、每個地址的獨立 Word，以及分類報告 CSV。</p><a class="button primary" id="download">下載成果 ZIP</a><div class="actions" style="justify-content:center"><button class="secondary" onclick="location.reload()">處理下一批</button></div></section>
</main>
<script>
let selected=[], sessionId='', records=[], pendingOnly=false;
const $=id=>document.getElementById(id), drop=$('drop'), input=$('files');
function setFiles(files){selected=[...files];$('analyze').disabled=!selected.length;$('fileInfo').classList.toggle('hidden',!selected.length);$('fileInfo').textContent=selected.length?`已選擇 ${selected.length} 個檔案，原始檔不會被修改。`:''}
drop.onclick=()=>input.click(); input.onchange=e=>setFiles(e.target.files);['dragenter','dragover'].forEach(x=>drop.addEventListener(x,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(x=>drop.addEventListener(x,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>setFiles(e.dataTransfer.files));
function steps(n){[1,2,3].forEach(i=>{$('s'+i).className='step '+(i<n?'done':i===n?'active':'')})}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function updateSummary(){let ok=records.filter(r=>r.status==='success').length;let groups=new Set(records.filter(r=>r.status==='success').map(r=>r.first_level+'|'+r.second_level));$('total').textContent=records.length;$('success').textContent=ok;$('pending').textContent=records.length-ok;$('addresses').textContent=groups.size}
function badge(r){if(r.status==='success')return '<span class="badge ok">分類完成</span>';if(r.status==='compound')return '<span class="badge warn">複合地址待確認</span>';return `<span class="badge bad">${r.status==='unrecognized'?'地址無法辨識':'地址不完整'}</span>`}
function refreshStatus(r){r.first_level=(r.city+r.district+r.road).trim();r.second_level=r.detail.trim();if(r.first_level&&r.second_level)r.status='success';else if(!r.first_level&&!r.second_level)r.status='unrecognized';else r.status='incomplete'}
function render(){let q=$('search').value.trim().toLowerCase();let html='';records.forEach((r,i)=>{refreshStatus(r);let hay=(r.filename+r.first_level+r.second_level+r.ocr_text).toLowerCase();if((q&&!hay.includes(q))||(pendingOnly&&r.status==='success'))return;html+=`<article class="record" data-i="${i}"><img class="thumb" src="/api/preview/${sessionId}/${encodeURIComponent(r.filename)}"><div><div class="filename">${esc(r.filename)}</div><div class="ocr">${esc(r.ocr_text||'照片內未辨識到文字')}</div><div class="fields"><label>縣市<input data-k="city" value="${esc(r.city)}"></label><label>鄉鎮市區<input data-k="district" value="${esc(r.district)}"></label><label>路／街／段<input data-k="road" value="${esc(r.road)}"></label><label>門牌＋樓＋室<input data-k="detail" value="${esc(r.detail)}"></label><label>照片順序<input data-k="photo_number" type="number" min="1" value="${esc(r.photo_number)}"></label><label>處理方式<select data-k="status"><option value="success" ${r.status==='success'?'selected':''}>分類</option><option value="unrecognized" ${r.status==='unrecognized'?'selected':''}>地址無法辨識</option><option value="incomplete" ${r.status==='incomplete'?'selected':''}>地址不完整</option><option value="compound" ${r.status==='compound'?'selected':''}>複合地址待確認</option></select></label></div></div><div class="status">${badge(r)}<div class="confidence">辨識完整度 ${r.confidence}%</div></div></article>`});$('records').innerHTML=html||'<div class="notice">沒有符合條件的照片。</div>';$('records').querySelectorAll('input,select').forEach(el=>el.onchange=e=>{let i=+e.target.closest('.record').dataset.i;let k=e.target.dataset.k;records[i][k]=k==='photo_number'?+e.target.value:e.target.value;if(['city','district','road','detail'].includes(k))refreshStatus(records[i]);updateSummary();render()});updateSummary()}
$('analyze').onclick=async()=>{let b=$('analyze');b.disabled=true;b.textContent='正在辨識，照片較多時請稍候…';$('uploadError').classList.add('hidden');try{let fd=new FormData();selected.forEach(f=>fd.append('files',f,f.name));let res=await fetch('/api/analyze',{method:'POST',body:fd});let data=await res.json();if(!res.ok)throw Error(data.error||'上傳失敗');sessionId=data.session_id;records=data.records;$('uploadCard').classList.add('hidden');$('reviewCard').classList.remove('hidden');steps(2);render()}catch(e){$('uploadError').textContent=e.message;$('uploadError').classList.remove('hidden');b.disabled=false}finally{b.textContent='開始辨識與分類'}};
$('search').oninput=render;$('showPending').onclick=()=>{pendingOnly=!pendingOnly;$('showPending').textContent=pendingOnly?'顯示全部':'只看待確認';render()};$('back').onclick=()=>location.reload();
$('generate').onclick=async()=>{let b=$('generate');b.disabled=true;b.textContent='正在製作 Word 與成果 ZIP…';$('generateError').classList.add('hidden');try{let res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,records})});let data=await res.json();if(!res.ok)throw Error(data.error||'產生失敗');$('download').href=data.download_url;$('reviewCard').classList.add('hidden');$('resultCard').classList.remove('hidden');steps(3)}catch(e){$('generateError').textContent=e.message;$('generateError').classList.remove('hidden');b.disabled=false}finally{b.textContent='產生分類資料夾與 Word'}};
</script>
</body></html>
